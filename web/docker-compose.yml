services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: aep-web-postgres
    environment:
      POSTGRES_DB: aep_web
      POSTGRES_USER: aep_user
      POSTGRES_PASSWORD: aep_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aep_user -d aep_web"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: aep-web-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ..
      dockerfile: web/backend/Dockerfile
    container_name: aep-web-backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # App settings
      DEBUG: "true"
      
      # Database
      DATABASE_URL: postgresql+asyncpg://aep_user:aep_password@postgres:5432/aep_web
      
      # Redis
      REDIS_URL: redis://redis:6379/0
      
      # Security (CHANGE IN PRODUCTION!)
      SECRET_KEY: your-secret-key-min-32-characters-change-this
      
      # CORS
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:3001"]'
      
      # Adobe Experience Platform (set your credentials)
      AEP_CLIENT_ID: ${AEP_CLIENT_ID}
      AEP_CLIENT_SECRET: ${AEP_CLIENT_SECRET}
      AEP_ORG_ID: ${AEP_ORG_ID}
      AEP_TECHNICAL_ACCOUNT_ID: ${AEP_TECHNICAL_ACCOUNT_ID}
      AEP_SANDBOX_NAME: ${AEP_SANDBOX_NAME:-prod}
      AEP_TENANT_ID: ${AEP_TENANT_ID}
      
      # AI Providers
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
    volumes:
      - ../web/backend/app:/app/app
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    container_name: aep-web-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
